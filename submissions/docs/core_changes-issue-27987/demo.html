<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ease-toast — Demo</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f8fafc; color: #1e293b; padding: 3rem 1.5rem;
    }
    @media (prefers-color-scheme: dark) {
      body { background: #0f172a; color: #f1f5f9; }
    }
    .demo-header { text-align: center; margin-bottom: 3rem; }
    .demo-header h1 { font-size: clamp(2rem, 5vw, 3rem); }
    .demo-header p { color: #64748b; margin-top: 0.5rem; }
    .demo-section { max-width: 600px; margin: 0 auto; }
    .demo-section h2 {
      font-size: 0.75rem; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.1em; color: #6c63ff; margin-bottom: 0.75rem;
    }
    .class-tag {
      display: inline-block; font-size: 0.65rem; font-family: monospace;
      background: #f1f5f9; border: 1px solid #e2e8f0;
      border-radius: 999px; padding: 0.3em 0.75em; color: #6c63ff; margin-bottom: 1rem;
    }
    @media (prefers-color-scheme: dark) {
      .class-tag { background: #1e293b; border-color: #334155; }
    }
    .btn-group { display: flex; flex-wrap: wrap; gap: 0.75rem; }
    .btn {
      padding: 0.75rem 1.25rem; border: none; border-radius: 0.5rem;
      font-size: 0.875rem; font-weight: 600; cursor: pointer;
    }
    .btn-success { background: #10b981; color: white; }
    .btn-error { background: #ef4444; color: white; }
    .btn-warning { background: #f59e0b; color: white; }
    .btn-info { background: #3b82f6; color: white; }
    .pos-group { margin-top: 1.5rem; }
    .pos-group label { font-size: 0.8rem; margin-right: 0.5rem; }
    .pos-group select {
      padding: 0.4rem 0.75rem; border-radius: 0.375rem;
      border: 1px solid #cbd5e1; font-size: 0.8rem;
    }
    .note { text-align: center; font-size: 0.8rem; color: #64748b; margin-top: 2rem; }
  </style>
</head>
<body>
<header class="demo-header">
  <h1>ease-toast</h1>
  <p>Animated toast notifications</p>
</header>

<section class="demo-section">
  <h2>Show Toast</h2>
  <div class="class-tag">.ease-toast .ease-toast-container</div>

  <div class="pos-group">
    <label for="pos">Position:</label>
    <select id="pos">
      <option value="top-right">Top Right</option>
      <option value="top-left">Top Left</option>
      <option value="bottom-right">Bottom Right</option>
      <option value="bottom-left">Bottom Left</option>
    </select>
    <label for="duration" style="margin-left:1rem;">Auto-dismiss (ms):</label>
    <input type="number" id="duration" value="4000" style="width:80px;padding:0.4rem;border:1px solid #cbd5e1;border-radius:0.375rem;font-size:0.8rem;" />
  </div>

  <div class="btn-group" style="margin-top:1rem;">
    <button class="btn btn-success" onclick="demo('success','Saved successfully!')">Success</button>
    <button class="btn btn-error" onclick="demo('error','Something went wrong.')">Error</button>
    <button class="btn btn-warning" onclick="demo('warning','Check your input.')">Warning</button>
    <button class="btn btn-info" onclick="demo('info','New update available.')">Info</button>
  </div>
</section>

<script>
function getContainer() {
  var pos = document.getElementById('pos').value;
  var existing = document.querySelector('.ease-toast-container');
  if (existing) existing.remove();
  var c = document.createElement('div');
  c.className = 'ease-toast-container ease-toast-' + pos;
  document.body.appendChild(c);
  return c;
}

function demo(variant, msg) {
  var dur = parseInt(document.getElementById('duration').value) || 4000;
  easeToast.show({
    container: getContainer(),
    variant: variant,
    message: msg,
    duration: dur
  });
}
</script>

<p class="note">Toasts auto-dismiss. Close button also dismisses. Call <code>easeToast.show({ message, variant, duration })</code> from JS.</p>

<script src="toast.js"></script>
</body>
</html>
