<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>skills filter — Demo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/SAPTARSHI-coder/EaseMotion-css@main/easemotion.min.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="demo-header ease-fade-in">
    <h1>skills filter</h1>
    <p>Issue #30350 — skills filter for the student job board.</p>
  </div>

  <div class="filter-bar ease-slide-up ease-delay-100 ease-flex ease-gap-2 ease-items-center ease-flex-wrap">
    <label class="filter-label">Skills:</label>
    <label class="skill-opt"><input type="checkbox" value="Python" /> Python</label>
    <label class="skill-opt"><input type="checkbox" value="React" /> React</label>
    <label class="skill-opt"><input type="checkbox" value="SQL" /> SQL</label>
    <label class="skill-opt"><input type="checkbox" value="AWS" /> AWS</label>
    <label class="skill-opt"><input type="checkbox" value="C" /> C/C++</label>
  </div>
  <style>
    .filter-bar { flex-wrap: wrap; gap: 0.5rem; }
    .skill-opt { display: inline-flex; align-items: center; gap: 0.3rem; font-size: 0.8rem; cursor: pointer; }
    .skill-opt input { accent-color: #6c63ff; }
  </style>

  <div class="job-grid ease-grid ease-gap-4" id="job-grid"></div>

  <script>
    const jobs = [{"title": "Software Engineer", "company": "Google", "branch": "CS", "cgpa": 8.0, "skills": ["Python", "Java", "React"]}, {"title": "Data Analyst", "company": "Amazon", "branch": "IT", "cgpa": 6.5, "skills": ["SQL", "Python", "Excel"]}, {"title": "Frontend Dev", "company": "Meta", "branch": "CS", "cgpa": 7.0, "skills": ["React", "CSS", "JS"]}, {"title": "Backend Dev", "company": "Microsoft", "branch": "CS", "cgpa": 7.5, "skills": ["C#", "Azure", "SQL"]}, {"title": "DevOps Engineer", "company": "Netflix", "branch": "IT", "cgpa": 8.5, "skills": ["AWS", "Docker", "K8s"]}, {"title": "Cloud Architect", "company": "AWS", "branch": "IT", "cgpa": 8.0, "skills": ["AWS", "GCP", "Terraform"]}, {"title": "Network Admin", "company": "Cisco", "branch": "IT", "cgpa": 6.0, "skills": ["CCNA", "Firewall", "TCP/IP"]}, {"title": "Embedded Eng", "company": "Tesla", "branch": "ECE", "cgpa": 8.5, "skills": ["C", "RTOS", "FPGA"]}, {"title": "Hardware Eng", "company": "AMD", "branch": "ECE", "cgpa": 7.5, "skills": ["VHDL", "Verilog", "PCB"]}, {"title": "Aerospace Eng", "company": "SpaceX", "branch": "ME", "cgpa": 9.0, "skills": ["CAD", "MATLAB", "Simulink"]}];
    const grid = document.getElementById("job-grid");

    function render(jobs) {
      grid.innerHTML = jobs.length
        ? jobs.map((j, i) => '' + '<span class="tag"></span>' + ').join("")
        : '<div class="no-results">No jobs match your criteria.</div>';
    }

    const checkboxes = document.querySelectorAll(".skill-opt input");
    function getSelected() { return Array.from(checkboxes).filter(c => c.checked).map(c => c.value); }
    checkboxes.forEach(cb => cb.addEventListener("change", () => {
      const sel = getSelected();
      render(jobs.filter(j => sel.length === 0 || sel.some(s => j.skills.includes(s))));
    }));

    render(jobs);
  </script>
</body>
</html>
