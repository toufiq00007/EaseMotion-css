<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Typing Indicator - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-wrapper">
    <h1>Typing Indicator</h1>
    <p class="desc">Bouncing dots show someone is typing</p>
    <div class="ti-chat">
      <div class="ti-msg ti-received">
        <div class="ti-avatar"></div>
        <div class="ti-bubble">
          <p>Hey, how are you?</p>
        </div>
      </div>
      <div class="ti-msg ti-sent">
        <div class="ti-bubble">
          <p>I'm good, thanks! Did you see the new update?</p>
        </div>
      </div>
      <div class="ti-typing" id="tiTyping">
        <div class="ti-avatar"></div>
        <div class="ti-bubble ti-bubble-typing">
          <span class="ti-dot"></span>
          <span class="ti-dot"></span>
          <span class="ti-dot"></span>
        </div>
      </div>
    </div>
    <button class="ti-btn" id="tiBtn">Toggle Typing</button>
  </div>
  <script>
    const typing = document.getElementById('tiTyping');
    const btn = document.getElementById('tiBtn');

    btn.addEventListener('click', () => {
      const hidden = typing.style.display === 'none';
      typing.style.display = hidden ? 'flex' : 'none';
      btn.textContent = hidden ? 'Hide Typing' : 'Show Typing';
    });
  </script>
</body>
</html>
