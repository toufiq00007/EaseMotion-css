<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phase 419 - Climate Intelligence</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="hero">
        <h1>Climate Intelligence</h1>
        <div class="hero-stats">
            <div class="stat-card"><span class="stat-value">1.2C</span><span class="stat-label">Warming</span></div>
            <div class="stat-card"><span class="stat-value">36.8B</span><span class="stat-label">Tons CO2</span></div>
            <div class="stat-card"><span class="stat-value">67</span><span class="stat-label">Risk Index</span></div>
            <div class="stat-card"><span class="stat-value">34%</span><span class="stat-label">Renewable</span></div>
        </div>
    </header>
    <main class="dashboard">
        <section class="section">
            <h2>Environmental Metrics</h2>
            <div class="grid-4">
                <div class="card"><h3>Air Quality</h3><div class="value good">AQI 42</div></div>
                <div class="card"><h3>Sea Level</h3><div class="value warning">+3.4mm/yr</div></div>
                <div class="card"><h3>Forest Cover</h3><div class="value success">31%</div></div>
                <div class="card"><h3>Ice Loss</h3><div class="value critical">-280 Gt/yr</div></div>
            </div>
        </section>
        <section class="section executive">
            <h2>Sustainability Goals</h2>
            <div class="grid-3">
                <div class="exec-card"><h3>Net Zero Target</h3><div class="exec-value">2050</div></div>
                <div class="exec-card"><h3>Progress</h3><div class="exec-value">23%</div></div>
                <div class="exec-card"><h3>Renewable Growth</h3><div class="exec-value success">+18%</div></div>
            </div>
        </section>
    </main>
</body>
</html>
