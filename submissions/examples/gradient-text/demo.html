<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ease Gradient Text Demo</title>
    
    <!-- Core Framework -->
    <link rel="stylesheet" href="../../../easemotion.css">
    <!-- Local Feature CSS -->
    <link rel="stylesheet" href="style.css">

    <style>
        body {
            font-family: var(--ease-font-sans, system-ui, sans-serif);
            background-color: var(--ease-color-bg, #f8fafc);
            padding: var(--ease-space-8, 2rem);
            color: var(--ease-color-neutral-900, #0f172a);
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            text-align: center;
        }
        .grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: var(--ease-space-8, 2rem);
            margin-top: var(--ease-space-8, 2rem);
        }
        @media (min-width: 640px) {
            .grid {
                grid-template-columns: 1fr 1fr;
            }
        }
        .demo-card {
            background: #ffffff;
            padding: var(--ease-space-6, 1.5rem);
            border-radius: var(--ease-radius-lg, 1rem);
            box-shadow: var(--ease-shadow-md, 0 4px 6px -1px rgba(0, 0, 0, 0.1));
            border: 1px solid var(--ease-color-neutral-200, #e2e8f0);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 150px;
        }
        h1 {
            font-size: var(--ease-text-4xl, 2.25rem);
            font-weight: 800;
            margin: 0;
        }
        h2 {
            font-size: var(--ease-text-2xl, 1.5rem);
            font-weight: 700;
            margin-bottom: var(--ease-space-2, 0.5rem);
        }
        code {
            display: block;
            margin-top: var(--ease-space-4, 1rem);
            padding: var(--ease-space-2, 0.5rem);
            background: var(--ease-color-neutral-100, #f1f5f9);
            border-radius: var(--ease-radius-md, 0.5rem);
            font-size: var(--ease-text-sm, 0.875rem);
            color: var(--ease-color-neutral-600, #475569);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Animated <span class="ease-gradient-text ease-gradient-text-animate ease-gradient-ocean">Gradient Text</span></h1>
        <p>Pure CSS utilities for beautiful text gradients without Javascript.</p>

        <div class="grid">
            <div class="demo-card">
                <h2 class="ease-gradient-text">Default Theme</h2>
                <code>.ease-gradient-text</code>
            </div>

            <div class="demo-card">
                <h2 class="ease-gradient-text ease-gradient-sunset">Sunset Theme</h2>
                <code>.ease-gradient-sunset</code>
            </div>

            <div class="demo-card">
                <h2 class="ease-gradient-text ease-gradient-ocean">Ocean Theme</h2>
                <code>.ease-gradient-ocean</code>
            </div>

            <div class="demo-card">
                <h2 class="ease-gradient-text ease-gradient-forest">Forest Theme</h2>
                <code>.ease-gradient-forest</code>
            </div>

            <div class="demo-card" style="grid-column: 1 / -1; padding: 3rem;">
                <h1 class="ease-gradient-text ease-gradient-sunset ease-gradient-text-animate" style="font-size: 3rem;">
                    Animated Sunset
                </h1>
                <code style="display: inline-block;">.ease-gradient-text-animate</code>
            </div>
        </div>
    </div>
</body>
</html>
