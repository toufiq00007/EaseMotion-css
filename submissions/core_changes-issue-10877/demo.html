<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gallery — View Transitions Demo</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="page-header">
    <h1>Explore Nature</h1>
    <p>Click any card to experience a smooth cross-document view transition</p>
  </header>

  <main class="gallery">
    <a href="detail.html" class="card">
      <span class="card-image" style="background: linear-gradient(135deg, #667eea, #764ba2); view-transition-name: card-hero;"></span>
      <span class="card-label">Mountain Escape</span>
    </a>
    <a href="detail.html" class="card">
      <span class="card-image" style="background: linear-gradient(135deg, #f093fb, #f5576c); view-transition-name: card-hero;"></span>
      <span class="card-label">Sunset Coast</span>
    </a>
    <a href="detail.html" class="card">
      <span class="card-image" style="background: linear-gradient(135deg, #4facfe, #00f2fe); view-transition-name: card-hero;"></span>
      <span class="card-label">Ocean Deep</span>
    </a>
    <a href="detail.html" class="card">
      <span class="card-image" style="background: linear-gradient(135deg, #43e97b, #38f9d7); view-transition-name: card-hero;"></span>
      <span class="card-label">Forest Trail</span>
    </a>
  </main>

  <footer class="page-footer">
    <p>Built with <a href="https://developer.mozilla.org/en-US/docs/Web/API/View_Transitions_API">CSS View Transitions API</a></p>
  </footer>
</body>
</html>
